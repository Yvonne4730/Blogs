name: Deploy Hexo site to GitHub Pages

on:
  push:
    branches: [ main ]          # 如果你是 master 分支，改成 master
  workflow_dispatch:            # 允许手动触发

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 仓库
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'      # Hexo 官方推荐 18+，20 最稳
          cache: 'npm'

      - name: 安装依赖
        run: npm ci

      - name: 生成静态文件
        run: npx hexo clean && npx hexo generate   # 清理 + 生成

      - name: 上传构建产物
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4